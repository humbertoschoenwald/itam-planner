# Derived from ADR-0002 and ADR-0006.
# This repository uses uv as the only supported Python environment and package workflow.

[tool.uv]
package = false

[tool.ruff]
target-version = "py312"
line-length = 100
src = ["apps", "packages", "scripts", "tests"]

[tool.ruff.lint]
select = ["E", "F", "I", "B", "UP", "RUF"]

[tool.ruff.format]
quote-style = "double"
indent-style = "space"

[tool.basedpyright]
typeCheckingMode = "strict"
pythonVersion = "3.12"
include = ["apps", "packages", "scripts", "tests"]
exclude = [
  "**/__pycache__",
  ".venv",
  "venv",
  "dist",
  "build"
]
reportMissingTypeStubs = false
