name: Changelog Bot

on:
  workflow_run:
    workflows:
      - CI
    types:
      - completed
  workflow_dispatch:

concurrency:
  group: update-changelog-main
  cancel-in-progress: true

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  update:
    name: Regenerate CHANGELOG.md after CI
    runs-on: ubuntu-latest
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (
        github.event.workflow_run.conclusion == 'success' &&
        github.event.workflow_run.head_branch == 'main' &&
        github.event.workflow_run.event == 'push' &&
        github.event.workflow_run.head_commit.message != 'chore(changelog): update changelog'
      )

    steps:
      - name: Check out repository
        uses: actions/checkout@v6.0.2
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && github.ref_name || github.event.workflow_run.head_sha }}
          fetch-depth: 0

      - name: Set up Node.js 25
        uses: actions/setup-node@v6.3.0
        with:
          node-version: 25

      - name: Compute Mexico City push date
        id: push_date
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "value=$(TZ=America/Mexico_City date +%F)" >> "$GITHUB_OUTPUT"
          else
            echo "value=$(TZ=America/Mexico_City date --date='${{ github.event.workflow_run.created_at }}' +%F)" >> "$GITHUB_OUTPUT"
          fi

      - name: Generate changelog from pushed commits
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            BEFORE_SHA=""
            CURRENT_SHA="${{ github.sha }}"
          else
            CURRENT_SHA="${{ github.event.workflow_run.head_sha }}"
            if git rev-parse "${CURRENT_SHA}^" >/dev/null 2>&1; then
              BEFORE_SHA="$(git rev-parse "${CURRENT_SHA}^")"
            else
              BEFORE_SHA=""
            fi
          fi

          if [[ -z "$BEFORE_SHA" || "$BEFORE_SHA" =~ ^0+$ ]]; then
            node scripts/generate-changelog.mjs --mode full
          else
            node scripts/generate-changelog.mjs \
              --mode incremental \
              --since "$BEFORE_SHA" \
              --until "$CURRENT_SHA" \
              --date "${{ steps.push_date.outputs.value }}"
          fi

      - name: Commit generated changelog
        shell: bash
        run: |
          if git diff --quiet -- CHANGELOG.md; then
            echo "CHANGELOG.md already matches the current push."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add CHANGELOG.md
          git commit -m "chore(changelog): update changelog"
          git push origin HEAD:main
