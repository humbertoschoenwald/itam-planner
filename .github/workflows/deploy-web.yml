name: Deploy Web

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/deploy-web.yml"
      - "apps/web/**"
      - "package.json"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
  workflow_dispatch:

concurrency:
  group: deploy-web-production
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  deploy:
    if: ${{ secrets.VERCEL_TOKEN != '' && secrets.VERCEL_ORG_ID != '' && secrets.VERCEL_PROJECT_ID != '' }}
    name: Deploy to Vercel
    runs-on: ubuntu-latest
    environment: production
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v6.0.2

      - name: Set up pnpm
        uses: pnpm/action-setup@v5.0.0
        with:
          version: 10.33.0

      - name: Set up Node.js 24
        uses: actions/setup-node@v6.3.0
        with:
          cache: pnpm
          node-version: 24

      - name: Install workspace dependencies
        run: pnpm install --frozen-lockfile

      - name: Sync published catalog into the web artifact
        run: pnpm catalog:sync:web

      - name: Pull Vercel environment
        run: pnpm dlx vercel@latest pull --cwd apps/web --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build Vercel artifacts
        run: pnpm dlx vercel@latest build --cwd apps/web --prod --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy production build
        run: pnpm dlx vercel@latest deploy --cwd apps/web --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}
