name: Deploy Web

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/deploy-web.yml"
      - "apps/web/**"
      - "package.json"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
  workflow_dispatch:

concurrency:
  group: deploy-web-production
  cancel-in-progress: true

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  deploy:
    name: Deploy to Vercel
    runs-on: ubuntu-latest
    environment: production
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

    steps:
      - name: Check Vercel deployment secrets
        id: secrets
        shell: bash
        run: |
          if [[ -z "${{ secrets.VERCEL_TOKEN }}" || -z "${{ secrets.VERCEL_ORG_ID }}" || -z "${{ secrets.VERCEL_PROJECT_ID }}" ]]; then
            echo "ready=false" >> "$GITHUB_OUTPUT"
            echo "Vercel deployment secrets are missing. Skipping deploy."
          else
            echo "ready=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Check out repository
        if: steps.secrets.outputs.ready == 'true'
        uses: actions/checkout@v6.0.2

      - name: Set up pnpm
        if: steps.secrets.outputs.ready == 'true'
        uses: pnpm/action-setup@v5.0.0
        with:
          version: 10.33.0

      - name: Set up Node.js 25
        if: steps.secrets.outputs.ready == 'true'
        uses: actions/setup-node@v6.3.0
        with:
          cache: pnpm
          node-version: 25

      - name: Install workspace dependencies
        if: steps.secrets.outputs.ready == 'true'
        run: pnpm install --frozen-lockfile

      - name: Sync published catalog into the web artifact
        if: steps.secrets.outputs.ready == 'true'
        run: pnpm catalog:sync:web

      - name: Pull Vercel environment
        if: steps.secrets.outputs.ready == 'true'
        run: pnpm dlx vercel@latest pull --cwd apps/web --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build Vercel artifacts
        if: steps.secrets.outputs.ready == 'true'
        run: pnpm dlx vercel@latest build --cwd apps/web --prod --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy production build
        if: steps.secrets.outputs.ready == 'true'
        run: pnpm dlx vercel@latest deploy --cwd apps/web --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}
