name: CI

on:
  push:
    branches:
      - main
    paths-ignore:
      - "CHANGELOG.md"
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  repo-lint:
    name: Repository lint
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6.0.2

      - name: Set up pnpm
        uses: pnpm/action-setup@v5.0.0
        with:
          version: 10.33.0

      - name: Set up Node.js 24
        uses: actions/setup-node@v6.3.0
        with:
          cache: pnpm
          node-version: 24

      - name: Set up Python 3.14
        uses: actions/setup-python@v6.2.0
        with:
          python-version: "3.14"

      - name: Set up uv
        uses: astral-sh/setup-uv@v8.0.0

      - name: Install workspace dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint markdown and spelling
        run: pnpm lint:repo

      - name: Install shellcheck
        run: sudo apt-get update && sudo apt-get install --yes shellcheck

      - name: Lint shell scripts
        run: |
          mapfile -t hook_files < <(find .githooks -type f)
          if [ "${#hook_files[@]}" -gt 0 ]; then
            shellcheck "${hook_files[@]}"
          fi
        shell: bash

      - name: Lint YAML
        run: uvx yamllint .

      - name: Lint GitHub Actions workflows
        uses: rhysd/actionlint@v1.7.12

  api:
    name: API checks
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6.0.2

      - name: Set up pnpm
        uses: pnpm/action-setup@v5.0.0
        with:
          version: 10.33.0

      - name: Set up Node.js 24
        uses: actions/setup-node@v6.3.0
        with:
          cache: pnpm
          node-version: 24

      - name: Set up Python 3.14
        uses: actions/setup-python@v6.2.0
        with:
          python-version: "3.14"

      - name: Set up uv
        uses: astral-sh/setup-uv@v8.0.0

      - name: Install workspace dependencies
        run: pnpm install --frozen-lockfile

      - name: Run API CI mirror
        run: pnpm ci:api

      - name: Upload API coverage report
        uses: actions/upload-artifact@v4
        with:
          if-no-files-found: error
          name: api-coverage-xml
          path: coverage/api/coverage.xml

  web-stable:
    name: Web checks (Node 24)
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6.0.2

      - name: Set up pnpm
        uses: pnpm/action-setup@v5.0.0
        with:
          version: 10.33.0

      - name: Set up Node.js 24
        uses: actions/setup-node@v6.3.0
        with:
          cache: pnpm
          node-version: 24

      - name: Install workspace dependencies
        run: pnpm install --frozen-lockfile

      - name: Run web stable CI mirror
        run: pnpm ci:web

      - name: Upload web coverage report
        uses: actions/upload-artifact@v4
        with:
          if-no-files-found: error
          name: web-coverage-xml
          path: coverage/web/cobertura-coverage.xml

  web-current:
    name: Web canary (Node 25)
    runs-on: ubuntu-latest
    continue-on-error: true

    steps:
      - name: Check out repository
        uses: actions/checkout@v6.0.2

      - name: Set up pnpm
        uses: pnpm/action-setup@v5.0.0
        with:
          version: 10.33.0

      - name: Set up Node.js 25
        uses: actions/setup-node@v6.3.0
        with:
          cache: pnpm
          node-version: 25

      - name: Install workspace dependencies
        run: pnpm install --frozen-lockfile

      - name: Run web compatibility canary
        run: pnpm ci:web:compat

  coverage:
    name: Coverage merge
    runs-on: ubuntu-latest
    needs:
      - api
      - web-stable

    steps:
      - name: Check out repository
        uses: actions/checkout@v6.0.2

      - name: Set up Node.js 24
        uses: actions/setup-node@v6.3.0
        with:
          node-version: 24

      - name: Download API coverage artifact
        uses: actions/download-artifact@v5
        with:
          name: api-coverage-xml
          path: coverage/api

      - name: Download web coverage artifact
        uses: actions/download-artifact@v5
        with:
          name: web-coverage-xml
          path: coverage/web

      - name: Merge Cobertura reports
        run: node scripts/merge-coverage.mjs

      - name: Upload merged coverage report
        uses: actions/upload-artifact@v4
        with:
          if-no-files-found: error
          name: coverage-xml
          path: coverage.xml
