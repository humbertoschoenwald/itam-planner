name: CI

on:
  push:
    branches:
      - main
    paths-ignore:
      - "CHANGELOG.md"
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6.0.2

      - name: Set up pnpm
        uses: pnpm/action-setup@v5.0.0
        with:
          version: 10.33.0

      - name: Set up Node.js 25
        uses: actions/setup-node@v6.3.0
        with:
          cache: pnpm
          node-version: 25

      - name: Set up Python 3.14
        uses: actions/setup-python@v6.2.0
        with:
          python-version: "3.14"

      - name: Set up uv
        uses: astral-sh/setup-uv@v8.0.0

      - name: Install workspace dependencies
        run: pnpm install --frozen-lockfile

      - name: Run repository CI mirror
        run: pnpm ci:repo

      - name: Install shellcheck
        run: sudo apt-get update && sudo apt-get install --yes shellcheck

      - name: Lint shell scripts
        run: |
          mapfile -t hook_files < <(find .githooks -type f)
          if [ "${#hook_files[@]}" -gt 0 ]; then
            shellcheck "${hook_files[@]}"
          fi
        shell: bash

      - name: Lint YAML
        run: uvx yamllint .

      - name: Lint GitHub Actions workflows
        uses: rhysd/actionlint@v1.7.12

      - name: Run API CI mirror
        run: pnpm ci:api

      - name: Run web CI mirror
        run: pnpm ci:web:full

      - name: Merge Cobertura reports
        run: node scripts/merge-coverage.mjs
