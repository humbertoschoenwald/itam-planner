name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  repo-lint:
    name: Repository lint
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6.0.2

      - name: Set up pnpm
        uses: pnpm/action-setup@v5.0.0
        with:
          version: 10.33.0

      - name: Set up Node.js 24
        uses: actions/setup-node@v6.3.0
        with:
          cache: pnpm
          node-version: 24

      - name: Set up Python 3.14
        uses: actions/setup-python@v6.2.0
        with:
          python-version: "3.14"

      - name: Set up uv
        uses: astral-sh/setup-uv@v8.0.0

      - name: Install workspace dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint markdown and spelling
        run: pnpm lint:repo

      - name: Install shellcheck
        run: sudo apt-get update && sudo apt-get install --yes shellcheck

      - name: Lint shell scripts
        run: |
          mapfile -t hook_files < <(find .githooks -type f)
          if [ "${#hook_files[@]}" -gt 0 ]; then
            shellcheck "${hook_files[@]}"
          fi
        shell: bash

      - name: Lint YAML
        run: uvx yamllint .

      - name: Lint GitHub Actions workflows
        uses: rhysd/actionlint@v1.7.12

  api:
    name: API checks
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6.0.2

      - name: Set up Python 3.14
        uses: actions/setup-python@v6.2.0
        with:
          python-version: "3.14"

      - name: Set up uv
        uses: astral-sh/setup-uv@v8.0.0

      - name: Sync API dependencies
        run: uv sync --project apps/api --group dev

      - name: Run Ruff
        run: uv run --project apps/api --group dev ruff check apps/api

      - name: Run basedpyright
        run: uv run --project apps/api --group dev basedpyright apps/api/src

      - name: Run pytest
        run: uv run --project apps/api --group dev pytest

      - name: Rebuild fixture snapshot
        run: uv run --project apps/api python -m itam_planner_api.cli ingest-fixtures --fixtures-root apps/api/tests/fixtures --public-data-root public-data

      - name: Verify promoted snapshot is committed
        run: pnpm verify:catalog

  web-stable:
    name: Web checks (Node 24)
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6.0.2

      - name: Set up pnpm
        uses: pnpm/action-setup@v5.0.0
        with:
          version: 10.33.0

      - name: Set up Node.js 24
        uses: actions/setup-node@v6.3.0
        with:
          cache: pnpm
          node-version: 24

      - name: Install workspace dependencies
        run: pnpm install --frozen-lockfile

      - name: Run ESLint
        run: pnpm lint:web

      - name: Run Vitest
        run: pnpm test:web

      - name: Run TypeScript checks
        run: pnpm typecheck:web

      - name: Build Next.js app
        run: pnpm build:web

  web-current:
    name: Web canary (Node 25)
    runs-on: ubuntu-latest
    continue-on-error: true

    steps:
      - name: Check out repository
        uses: actions/checkout@v6.0.2

      - name: Set up pnpm
        uses: pnpm/action-setup@v5.0.0
        with:
          version: 10.33.0

      - name: Set up Node.js 25
        uses: actions/setup-node@v6.3.0
        with:
          cache: pnpm
          node-version: 25

      - name: Install workspace dependencies
        run: pnpm install --frozen-lockfile

      - name: Run web compatibility canary
        run: pnpm lint:web && pnpm test:web && pnpm typecheck:web && pnpm build:web
